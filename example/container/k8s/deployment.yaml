apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtls-server
  labels:
    app: mtls-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mtls-server
  template:
    metadata:
      labels:
        app: mtls-server
    spec:
      containers:
        - name: mtls-server
          image: mtls-server:latest
          ports:
            - name: mtls
              containerPort: 8443
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: MTLS_PORT
              value: "8443"
            - name: HEALTH_PORT
              value: "8080"
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              memory: "128Mi"
              cpu: "250m"
            requests:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: tls-certs
          secret:
            secretName: mtls-server-certs
---
apiVersion: v1
kind: Service
metadata:
  name: mtls-server
spec:
  selector:
    app: mtls-server
  ports:
    - name: mtls
      port: 8443
      targetPort: mtls
    - name: health
      port: 8080
      targetPort: health
