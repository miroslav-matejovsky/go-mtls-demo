# ─── Certificate Authority ────────────────────────────────────────────────────
[ca]
# Common Name embedded in the CA certificate's subject.
cn        = "go mTLS TPM Demo CA"
# Path where the CA certificate (PEM) is written.
cert_file = "certs/mtlstpm/ca/cert.crt"
# How long the CA and all leaf certificates it signs remain valid.
# Uses Go duration syntax: "24h", "720h" (30 days), "8760h" (1 year).
validity  = "24h"

# ─── mTLS Server ──────────────────────────────────────────────────────────────
[server]
# TCP address the server listens on.  Use "0.0.0.0:<port>" to accept on all interfaces.
address      = "127.0.0.1:8445"
# Common Name embedded in the server leaf certificate's subject.
cn           = "go mTLS TPM Demo Server"
# Path where the server certificate (PEM) is written and loaded from at runtime.
cert_file    = "certs/mtlstpm/server/server.crt"
# Path where the server private key (PEM) is written and loaded from at runtime.
key_file     = "certs/mtlstpm/server/server.key"
# Path where the CA certificate copy is placed for the server.
# The server reads this file to build its client-CA trust pool (RequireAndVerifyClientCert).
ca_cert_file = "certs/mtlstpm/server/ca.crt"

# ─── Client (TPM-backed key in Windows Certificate Store) ─────────────────────
[client]
# Common Name embedded in the client leaf certificate's subject.
# Also used to look up the certificate from the Windows cert store at runtime.
cn        = "go mTLS TPM Demo Client"
# NCrypt key container name used to store the client private key.
# Each unique name creates an isolated key slot in the KSP.
container = "go-mtls-demo-client"

# ─── Windows Key Storage Provider ─────────────────────────────────────────────
[store]
# Certificate store location. Only "CurrentUser" is supported by this demo.
# "LocalMachine" requires administrative privileges and is outside scope here.
location = "CurrentUser"
# Key Storage Provider (KSP) used to generate and store the client private key.
# Leave empty to auto-select based on TPM availability:
#   TPM 2.0 present and enabled → "Microsoft Platform Crypto Provider"   (hardware-bound, non-exportable)
#   TPM not available / not ready → "Microsoft Software Key Storage Provider" (software KSP)
# Override with a specific provider name to bypass auto-detection, e.g.:
#   provider_override = "Microsoft Software Key Storage Provider"
provider_override = ""

# ─── Untrusted Client (negative test) ─────────────────────────────────────────
# A second, independent CA and client cert are generated in-memory under this section.
# The private key is ephemeral (not stored in the Windows cert store).
# The server does not trust this CA, so the TLS handshake must be rejected.
[untrusted]
# Common Name for the untrusted CA used only to sign the rogue client cert.
ca_cn = "go mTLS TPM Untrusted CA"
# Common Name embedded in the rogue client certificate's subject.
cn    = "go mTLS TPM Untrusted Client"
