# ─── Certificate Authority ────────────────────────────────────────────────────
[ca]
# Common Name embedded in the CA certificate's subject.
cn        = "go mTLS Demo CA"
# Path where the CA certificate (PEM) is written.
cert_file = "certs/mtlsfiles/ca/cert.crt"
# How long the CA and all leaf certificates it signs remain valid.
# Uses Go duration syntax: "24h", "720h" (30 days), "8760h" (1 year).
validity  = "24h"

# ─── mTLS Server ──────────────────────────────────────────────────────────────
[server]
# TCP address the server listens on.  Use "0.0.0.0:<port>" to accept on all interfaces.
address      = "127.0.0.1:8444"
# Common Name embedded in the server leaf certificate's subject.
cn           = "go mTLS Demo Server"
# Path where the server certificate (PEM) is written and loaded from at runtime.
cert_file    = "certs/mtlsfiles/server/server.crt"
# Path where the server private key (PEM) is written and loaded from at runtime.
key_file     = "certs/mtlsfiles/server/server.key"
# Path where the CA certificate copy is placed for the server.
# The server reads this file to build its client-CA trust pool (RequireAndVerifyClientCert).
ca_cert_file = "certs/mtlsfiles/server/ca.crt"

# ─── Trusted Client ───────────────────────────────────────────────────────────
[client]
# Common Name embedded in the client leaf certificate's subject.
cn           = "go mTLS Demo Client"
# Path where the client certificate (PEM) is written and loaded from at runtime.
cert_file    = "certs/mtlsfiles/client/client.crt"
# Path where the client private key (PEM) is written and loaded from at runtime.
key_file     = "certs/mtlsfiles/client/client.key"
# Path where the CA certificate copy is placed for the client.
# The client reads this file to build its trust pool and verify the server cert.
ca_cert_file = "certs/mtlsfiles/client/ca.crt"

# ─── Untrusted Client (negative test) ─────────────────────────────────────────
# A second, independent CA and client cert are generated under this section.
# The server does not trust this CA, so the TLS handshake must be rejected.
[untrusted]
# Common Name for the untrusted CA used only to sign the rogue client cert.
ca_cn        = "go mTLS Untrusted CA"
# Common Name embedded in the rogue client certificate's subject.
cn           = "go mTLS Untrusted Client"
# Paths for the rogue client's certificate and key files (written to disk for inspection).
cert_file    = "certs/mtlsfiles/untrusted/client.crt"
key_file     = "certs/mtlsfiles/untrusted/client.key"
ca_cert_file = "certs/mtlsfiles/untrusted/ca.crt"
