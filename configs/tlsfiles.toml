# ─── Certificate Authority ────────────────────────────────────────────────────
[ca]
# Common Name embedded in the CA certificate's subject.
cn        = "go TLS Demo CA"
# Path where the CA certificate (PEM) is written.
# Clients that need to verify the server must receive a copy of this file.
cert_file = "certs/tlsfiles/ca/cert.crt"
# How long the CA and all leaf certificates it signs remain valid.
# Uses Go duration syntax: "24h", "720h" (30 days), "8760h" (1 year).
validity  = "24h"

# ─── TLS Server ───────────────────────────────────────────────────────────────
[server]
# TCP address the server listens on.  Use "0.0.0.0:<port>" to accept on all interfaces.
address   = "127.0.0.1:8443"
# Common Name embedded in the server leaf certificate's subject.
cn        = "go TLS Demo Server"
# Path where the server certificate (PEM) is written and loaded from at runtime.
cert_file = "certs/tlsfiles/server/server.crt"
# Path where the server private key (PEM) is written and loaded from at runtime.
key_file  = "certs/tlsfiles/server/server.key"

# ─── Client ───────────────────────────────────────────────────────────────────
[client]
# Path where the CA certificate copy is placed for the client.
# The client reads this file to build its trust pool and verify the server cert.
ca_cert_file = "certs/tlsfiles/client/ca.crt"
